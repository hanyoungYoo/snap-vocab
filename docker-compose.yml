services:
  api:
    build: .
    env_file: .env
    environment:
      # 컨테이너 내부에서는 db 서비스명으로 접속
      DATABASE_URL: postgresql://snap:snap@db:5432/snap_vocab
      # Ollama는 호스트 머신에서 실행되므로 host.docker.internal 사용
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: snap_vocab
      POSTGRES_USER: snap
      POSTGRES_PASSWORD: snap
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snap -d snap_vocab"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:15
    environment:
      POSTGRES_DB: snap_vocab_test
      POSTGRES_USER: snap
      POSTGRES_PASSWORD: snap
    ports:
      - "15433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snap -d snap_vocab_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
