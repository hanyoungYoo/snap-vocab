<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>snap-vocab</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-box { background: #f3f4f6; border-radius: 12px; padding: 40px 48px; text-align: center; width: 320px; }
    .login-box h1 { margin: 0 0 8px; font-size: 22px; }
    .login-box p { margin: 0 0 24px; color: #6b7280; font-size: 13px; }
    .login-box input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .login-box button:hover { background: #4338ca; }
    .error { color: #ef4444; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>snap-vocab</h1>
    <p>API 키를 입력해 주세요</p>
    <form method="post" action="/login">
      <input type="password" name="key" placeholder="API Key" autofocus />
      <button type="submit">로그인</button>
      {% if error %}<p class="error">키가 올바르지 않습니다.</p>{% endif %}
    </form>
  </div>
</body>
</html>
