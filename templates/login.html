<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>snap-vocab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-sm rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-8 shadow-sm">
    <div class="flex items-center gap-2 mb-6">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-indigo-600 text-white font-bold">S</span>
      <h1 class="text-lg font-semibold">snap-vocab</h1>
    </div>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">API 키를 입력해 주세요.</p>
    <form method="post" action="/login" class="space-y-3">
      <input
        type="password"
        name="key"
        placeholder="API Key"
        autofocus
        class="w-full px-3 py-2.5 text-sm rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <button class="w-full py-2.5 rounded-md bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-500">
        로그인
      </button>
      {% if error %}
      <p class="text-xs text-rose-500 text-center">키가 올바르지 않습니다.</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
