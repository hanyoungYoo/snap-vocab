name: Lint & Format Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Sync dependencies
        run: uv sync

      - name: Run basic import check
        run: |
          python -c "import api.main; import api.db; import api.deps" || echo "Import check (optional)"
      - name: Check for Korean/non-English comments
        run: |
          echo "🔍 Checking for Korean comments..."
          if git diff origin/main HEAD --unified=0 --no-color | grep -E "^\+.*[가-힣]" 2>/dev/null | grep -v "Binary"; then
            echo "❌ Found Korean text in code/comments"
            echo "Exception: Local dev files (AGENTS.md, docs/steps/) can use Korean"
            exit 1
          fi
          echo "✅ No Korean comments found in code"

  test:
    runs-on: ubuntu-latest
    services:
      db-test:
        image: postgres:15
        env:
          POSTGRES_DB: snap_vocab_test
          POSTGRES_USER: snap
          POSTGRES_PASSWORD: snap
        ports:
          - 15433:5432
        options: >-
          --health-cmd "pg_isready -U snap -d snap_vocab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://snap:snap@localhost:15433/snap_vocab_test
      API_SECRET_KEY: test-secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Run tests
        run: uv run pytest tests/ -v

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript style (basic)
        run: |
          echo "✅ JavaScript style check"
          # Check for 'var ' usage (should use const/let)
          if grep -r "^\s*var " extension/ static/ --include="*.js" 2>/dev/null; then
            echo "❌ Found 'var' usage. Please use 'const' or 'let' instead."
            exit 1
          fi
          echo "✅ No 'var' usage found"
