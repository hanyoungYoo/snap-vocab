<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>snap-vocab 콘솔</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

  <header class="border-b border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-900/70 backdrop-blur sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-indigo-600 text-white text-sm font-bold">S</span>
        <h1 class="text-lg font-semibold">snap-vocab</h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="open-add-modal" class="text-xs px-3 py-1.5 rounded-md bg-indigo-600 text-white hover:bg-indigo-500">+ 카드 추가</button>
        <button id="theme-toggle" class="text-xs px-3 py-1.5 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">
          <span class="dark:hidden">🌙 다크</span>
          <span class="hidden dark:inline">☀️ 라이트</span>
        </button>
        <form method="post" action="/logout">
          <button class="text-xs px-3 py-1.5 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">로그아웃</button>
        </form>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 space-y-8">

    <!-- 운영 패널 -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-500 dark:text-slate-400">운영</h2>
        <div class="flex items-center gap-3">
          <button id="open-llm-settings" class="text-xs text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400">⚙ LLM 설정</button>
          <button id="status-refresh" class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">새로고침</button>
        </div>
      </div>
      <div class="px-5 py-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="admin-status">
        <div class="text-xs text-slate-500">로드 중…</div>
      </div>
      <div class="px-5 py-4 border-t border-slate-200 dark:border-slate-800 flex flex-wrap items-center gap-3">
        <button id="trigger-review" class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-500 disabled:opacity-50">
          지금 복습 알림 보내기
        </button>
        <span class="text-xs text-slate-500 dark:text-slate-400">스케줄러 다음 실행 외, 즉시 트리거합니다.</span>
      </div>
    </section>

    <!-- 통계 카드 -->
    <section class="grid grid-cols-2 lg:grid-cols-5 gap-4" id="summary-cards">
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
        <div class="text-xs text-slate-500 dark:text-slate-400">총 카드</div>
        <div class="text-2xl font-semibold mt-1" data-stat="total">—</div>
      </div>
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
        <div class="text-xs text-slate-500 dark:text-slate-400">오늘 복습 대상</div>
        <div class="text-2xl font-semibold mt-1 text-indigo-600 dark:text-indigo-400" data-stat="due_today">—</div>
      </div>
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
        <div class="text-xs text-slate-500 dark:text-slate-400">최근 7일 정답률</div>
        <div class="text-2xl font-semibold mt-1" data-stat="accuracy_7d">—</div>
      </div>
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
        <div class="text-xs text-slate-500 dark:text-slate-400">최근 7일 신규</div>
        <div class="text-2xl font-semibold mt-1" data-stat="new_7d">—</div>
      </div>
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
        <div class="text-xs text-slate-500 dark:text-slate-400">연속 학습일</div>
        <div class="text-2xl font-semibold mt-1 text-amber-500" data-stat="streak">—</div>
        <div class="text-xs text-slate-400 mt-0.5" id="streak-longest"></div>
      </div>
    </section>

    <!-- 차트 -->
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
        <h3 class="text-sm font-semibold mb-3">최근 30일 활동</h3>
        <div class="relative h-64"><canvas id="chart-timeseries"></canvas></div>
      </div>
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
        <h3 class="text-sm font-semibold mb-3">레벨 분포</h3>
        <div class="relative h-64"><canvas id="chart-levels"></canvas></div>
      </div>
    </section>

    <!-- 복습 예정 히트맵 -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold">복습 예정 달력 (향후 60일)</h3>
        <div class="text-xs text-slate-400" id="heatmap-legend">
          <span class="inline-flex items-center gap-1">적음 <span class="inline-flex gap-0.5">
            <span class="h-3 w-3 rounded-sm bg-indigo-100 dark:bg-indigo-950"></span>
            <span class="h-3 w-3 rounded-sm bg-indigo-300 dark:bg-indigo-700"></span>
            <span class="h-3 w-3 rounded-sm bg-indigo-500"></span>
            <span class="h-3 w-3 rounded-sm bg-indigo-700"></span>
          </span> 많음</span>
        </div>
      </div>
      <div id="heatmap-container" class="overflow-x-auto">
        <div class="text-xs text-slate-400">로드 중…</div>
      </div>
    </section>

    <!-- 카드 목록 -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex flex-wrap items-center gap-3">
        <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-500 dark:text-slate-400 mr-auto">카드</h2>
        <input id="filter-q" type="search" placeholder="표현 검색…" class="text-sm px-3 py-1.5 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
        <select id="filter-type" class="text-sm px-2 py-1.5 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950">
          <option value="">모든 타입</option>
          <option value="word">word</option>
          <option value="idiom">idiom</option>
          <option value="grammar">grammar</option>
        </select>
        <select id="filter-level" class="text-sm px-2 py-1.5 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950">
          <option value="">모든 레벨</option>
          <option value="0">L0</option><option value="1">L1</option><option value="2">L2</option>
          <option value="3">L3</option><option value="4">L4</option><option value="5">L5</option>
        </select>
        <label class="text-sm inline-flex items-center gap-1.5">
          <input id="filter-due" type="checkbox" class="rounded" /> 오늘 만기만
        </label>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 dark:bg-slate-950/40 text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">
            <tr>
              <th class="text-left px-4 py-2">표현</th>
              <th class="text-left px-4 py-2">타입</th>
              <th class="text-left px-4 py-2">뜻</th>
              <th class="text-left px-4 py-2 cursor-pointer" data-sort="level">레벨</th>
              <th class="text-left px-4 py-2 cursor-pointer" data-sort="next_review">다음 복습</th>
              <th class="px-4 py-2"></th>
            </tr>
          </thead>
          <tbody id="cards-tbody" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
        </table>
      </div>
      <div id="cards-empty" class="hidden px-5 py-10 text-center text-sm text-slate-500">표시할 카드가 없습니다.</div>
      <div class="px-5 py-3 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-xs text-slate-500">
        <div id="cards-count">—</div>
        <div class="flex items-center gap-2">
          <button id="page-prev" class="px-2 py-1 rounded border border-slate-300 dark:border-slate-700 disabled:opacity-40">‹ 이전</button>
          <span id="page-info">1</span>
          <button id="page-next" class="px-2 py-1 rounded border border-slate-300 dark:border-slate-700 disabled:opacity-40">다음 ›</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Drawer -->
  <div id="drawer-backdrop" class="hidden fixed inset-0 bg-black/40 z-20"></div>
  <aside id="drawer" class="fixed top-0 right-0 h-full w-full sm:w-[460px] bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 z-30 translate-x-full transition-transform overflow-y-auto">
    <div class="p-5 space-y-5" id="drawer-body"></div>
  </aside>

  <!-- Add Card Modal -->
  <div id="add-modal-backdrop" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-xl">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold">카드 추가</h2>
        <button id="close-add-modal" class="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-xs text-slate-500 mb-1">텍스트 입력 <span class="text-slate-400">(LLM이 단어·숙어·문법을 추출합니다)</span></label>
          <textarea id="add-text" rows="6" placeholder="학습한 대화나 문장을 붙여넣으세요…" class="w-full px-3 py-2 text-sm rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>
        <div id="add-result" class="hidden text-sm"></div>
        <div class="flex justify-end gap-2">
          <button id="cancel-add-modal" class="text-sm px-4 py-2 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">취소</button>
          <button id="submit-add-card" class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-500 disabled:opacity-50">추출 및 저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LLM Settings Modal -->
  <div id="llm-modal-backdrop" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-xl">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold">LLM 설정</h2>
        <button id="close-llm-modal" class="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
      </div>
      <form id="llm-settings-form" class="p-5 space-y-4">
        <label class="block text-xs">
          <span class="text-slate-500">Provider</span>
          <select name="llm_provider" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950">
            <option value="claude">claude</option>
            <option value="openrouter">openrouter</option>
            <option value="ollama">ollama</option>
          </select>
        </label>
        <label class="block text-xs">
          <span class="text-slate-500">API Key <span class="text-slate-400">(변경 시에만 입력)</span></span>
          <input name="llm_api_key" type="password" placeholder="변경하지 않으면 비워두세요" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
        </label>
        <label class="block text-xs">
          <span class="text-slate-500">Extract Model</span>
          <input name="extract_model" type="text" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
        </label>
        <label class="block text-xs">
          <span class="text-slate-500">Review Model</span>
          <input name="review_model" type="text" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
        </label>
        <div class="grid grid-cols-2 gap-3">
          <label class="block text-xs">
            <span class="text-slate-500">복습 시간 (HH:MM)</span>
            <input name="review_time" type="text" pattern="\d{2}:\d{2}" placeholder="21:00" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
          </label>
          <label class="block text-xs">
            <span class="text-slate-500">최대 복습 카드 수</span>
            <input name="review_max_cards" type="number" min="1" max="20" class="mt-1 w-full px-2 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950" />
          </label>
        </div>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" id="cancel-llm-modal" class="text-sm px-4 py-2 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">취소</button>
          <button type="submit" class="text-sm px-4 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-500 disabled:opacity-50">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-md text-sm bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-lg"></div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
