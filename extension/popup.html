<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>snap-vocab</title>
  <style>
    body { font: 13px system-ui, sans-serif; width: 280px; padding: 12px; }
    label { display: block; margin-top: 8px; color: #444; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 4px;
            border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 12px; padding: 8px 12px; background: #4F46E5;
             color: white; border: none; border-radius: 4px; cursor: pointer; }
    .status { margin-top: 8px; color: #16a34a; font-size: 12px; min-height: 14px; }
  </style>
</head>
<body>
  <h3 style="margin:0">snap-vocab</h3>
  <label>API URL
    <input id="apiUrl" placeholder="http://localhost:8000" />
  </label>
  <label>API Key
    <input id="apiKey" type="password" />
  </label>
  <button id="save">저장</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
