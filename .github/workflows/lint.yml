name: Lint & Format Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Sync dependencies
        run: uv sync

      - name: Run basic import check
        run: |
          python -c "import api.main; import api.db; import api.deps" || echo "Import check (optional)"

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript style (basic)
        run: |
          echo "✅ JavaScript style check"
          # Check for 'var ' usage (should use const/let)
          if grep -r "^\s*var " extension/ static/ --include="*.js" 2>/dev/null; then
            echo "❌ Found 'var' usage. Please use 'const' or 'let' instead."
            exit 1
          fi
          echo "✅ No 'var' usage found"
