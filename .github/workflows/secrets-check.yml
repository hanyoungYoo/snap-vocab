name: Secrets Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret detection
        run: |
          # Patterns to detect
          PATTERNS=(
            "sk-[A-Za-z0-9]\{20,\}"                    # OpenAI/Anthropic API keys
            "ANTHROPIC_API_KEY\s*=\s*['\"]?[A-Za-z0-9]"
            "TELEGRAM_BOT_TOKEN\s*=\s*['\"]?[0-9]"
            "TELEGRAM_CHAT_ID\s*=\s*['\"]?[0-9]"
            "LLM_API_KEY\s*=\s*['\"]?[A-Za-z0-9]"
            "DATABASE_PASSWORD\s*=\s*['\"]?[^\s]"
            "API_SECRET_KEY\s*=\s*['\"]?[^\s]"
          )

          echo "🔍 Scanning for secrets..."
          EXIT_CODE=0

          for pattern in "${PATTERNS[@]}"; do
            if git diff origin/main HEAD --color=never | grep -iE "$pattern"; then
              echo "❌ Secret pattern detected: $pattern"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No secrets detected"
          else
            echo ""
            echo "❌ BLOCKED: Secrets detected in this PR"
            echo ""
            echo "Please remove any API keys, tokens, or credentials."
            echo "Use environment variables instead (.env file)."
          fi

          exit $EXIT_CODE

  check-gitignore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check gitignore violations
        run: |
          echo "🔒 Checking for .gitignore violations..."

          FORBIDDEN_FILES=(
            "\.env$"
            "\.env\."
            "AGENTS\.md$"
            "PROGRESS\.md$"
            "docs/steps/"
            "\.claude/"
          )

          EXIT_CODE=0

          for forbidden in "${FORBIDDEN_FILES[@]}"; do
            if git diff origin/main HEAD --name-only | grep -E "$forbidden"; then
              echo "❌ Forbidden file: $forbidden"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No .gitignore violations"
          else
            echo ""
            echo "❌ BLOCKED: Files that should be ignored are in this PR"
            echo ""
            echo "These files must not be committed:"
            echo "  - .env* (environment variables)"
            echo "  - AGENTS.md (internal conventions)"
            echo "  - PROGRESS.md (progress tracking)"
            echo "  - docs/steps/ (implementation guides)"
            echo "  - .claude/ (internal development files)"
          fi

          exit $EXIT_CODE
